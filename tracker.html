<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000000;
  --surface: #1c1c1e;
  --surface-hover: #2c2c2e;
  --surface-elevated: #3a3a3c;
  --separator: rgba(255,255,255,0.08);
  --separator-bold: rgba(255,255,255,0.12);
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.55);
  --text-tertiary: rgba(255,255,255,0.3);
  --red: #ff453a;
  --orange: #ff9f0a;
  --blue: #0a84ff;
  --purple: #bf5af2;
  --green: #30d158;
  --red-bg: rgba(255,69,58,0.12);
  --orange-bg: rgba(255,159,10,0.12);
  --blue-bg: rgba(10,132,255,0.12);
  --purple-bg: rgba(191,90,242,0.12);
  --green-bg: rgba(48,209,88,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-pill: 100px;
}

html { 
  background: var(--bg); 
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  min-height: 100dvh;
  padding: 0;
}

/* ===== Header ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 10;
  padding: 16px 20px;
  background: rgba(0,0,0,0.72);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--separator);
}

.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}

.header-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

.header-updated {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
}

/* Stats */
.stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.stat-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  background: var(--surface);
  color: var(--text-secondary);
  transition: background 0.2s;
}

.stat-pill .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-pill .count {
  font-weight: 600;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
}

/* ===== Content ===== */
.content {
  padding: 8px 20px 40px;
}

/* ===== Sections ===== */
.section {
  margin-bottom: 8px;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 0;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

.section-header:hover .section-label {
  color: var(--text-primary);
}

.section-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.section-label {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-secondary);
  transition: color 0.2s;
}

.section-count {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-tertiary);
  margin-left: 2px;
}

.section-chevron {
  margin-left: auto;
  color: var(--text-tertiary);
  font-size: 12px;
  transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.section.collapsed .section-chevron {
  transform: rotate(-90deg);
}

.section-body {
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.25s;
  max-height: 2000px;
  opacity: 1;
}

.section.collapsed .section-body {
  max-height: 0;
  opacity: 0;
}

/* ===== Task List ===== */
.task-list {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
}

/* ===== Task Row ===== */
.task-row {
  display: flex;
  align-items: flex-start;
  padding: 14px 16px;
  gap: 12px;
  border-bottom: 0.5px solid var(--separator);
  transition: background 0.15s;
  cursor: default;
}

.task-row:last-child {
  border-bottom: none;
}

.task-row:hover {
  background: var(--surface-hover);
}

/* Status bar */
.task-status-bar {
  width: 3px;
  min-height: 36px;
  border-radius: 2px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Task main content */
.task-main {
  flex: 1;
  min-width: 0;
}

.task-top {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}

.task-assignee {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
}

.task-desc {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.4;
}

.task-meta-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.01em;
}

.tag-project {
  background: var(--surface-hover);
  color: var(--text-secondary);
}

.tag-priority-high {
  background: var(--red-bg);
  color: var(--red);
}

.tag-priority-medium {
  background: var(--orange-bg);
  color: var(--orange);
}

.tag-priority-low {
  background: var(--surface-hover);
  color: var(--text-tertiary);
}

.task-date {
  font-size: 12px;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.task-days {
  font-size: 12px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.task-days.overdue {
  color: var(--red);
}

.task-days.normal {
  color: var(--text-tertiary);
}

.task-days.today {
  color: var(--green);
}

.task-notes {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-top: 4px;
  line-height: 1.35;
}

/* ===== Empty State ===== */
.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 40vh;
  color: var(--text-tertiary);
  font-size: 15px;
  font-weight: 400;
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .header { padding: 14px 16px; }
  .header-title { font-size: 22px; }
  .content { padding: 4px 16px 32px; }
  .task-row { padding: 12px 14px; }
  .task-meta-row { gap: 8px; }
  .header-top { flex-direction: column; gap: 4px; }
}

/* ===== Fade-in ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-list {
  animation: fadeUp 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) both;
}

.section:nth-child(2) .task-list { animation-delay: 0.06s; }
.section:nth-child(3) .task-list { animation-delay: 0.12s; }
.section:nth-child(4) .task-list { animation-delay: 0.18s; }
.section:nth-child(5) .task-list { animation-delay: 0.24s; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const STATUS_CONFIG = {
  urgent:      { label: 'Горит',           color: 'var(--red)',    bg: 'var(--red-bg)',    icon: '●' },
  waiting:     { label: 'Ждёт ответа',    color: 'var(--orange)', bg: 'var(--orange-bg)', icon: '●' },
  in_progress: { label: 'В работе',        color: 'var(--blue)',   bg: 'var(--blue-bg)',   icon: '●' },
  blocked:     { label: 'Заблокировано',   color: 'var(--purple)', bg: 'var(--purple-bg)', icon: '●' },
  done:        { label: 'Закрыто',         color: 'var(--green)',  bg: 'var(--green-bg)',  icon: '●' }
};

const PRIORITY_LABELS = { high: 'High', medium: 'Medium', low: 'Low' };
const STATUS_ORDER = ['urgent', 'waiting', 'in_progress', 'blocked', 'done'];

function parseDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function today() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d;
}

function daysDiff(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return null;
  const t = today();
  return Math.round((d - t) / 86400000);
}

function formatDateShort(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return '—';
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function daysLabel(task) {
  if (task.deadline) {
    const diff = daysDiff(task.deadline);
    if (diff === null) return { text: '', cls: 'normal' };
    if (diff < 0) return { text: `${Math.abs(diff)} дн. просрочено`, cls: 'overdue' };
    if (diff === 0) return { text: 'сегодня', cls: 'today' };
    if (diff === 1) return { text: 'завтра', cls: 'normal' };
    return { text: `${diff} дн.`, cls: 'normal' };
  }
  // No deadline — show days since created
  const diff = daysDiff(task.created);
  if (diff === null) return { text: '', cls: 'normal' };
  return { text: `${Math.abs(diff)} дн. назад`, cls: 'normal' };
}

function renderApp(data) {
  const tasks = data.tasks || [];
  
  if (tasks.length === 0) {
    document.getElementById('app').innerHTML = '<div class="empty">Нет активных задач</div>';
    return;
  }

  const grouped = {};
  STATUS_ORDER.forEach(s => grouped[s] = []);
  tasks.forEach(t => {
    if (grouped[t.status]) grouped[t.status].push(t);
  });

  const counts = {
    total: tasks.length,
    urgent: grouped.urgent.length,
    waiting: grouped.waiting.length,
    active: grouped.in_progress.length,
    done: grouped.done.length
  };

  // Updated timestamp
  let updatedStr = '';
  if (data.lastUpdated) {
    const d = new Date(data.lastUpdated);
    updatedStr = d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }) 
      + ', ' + d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  }

  let html = `
    <div class="header">
      <div class="header-top">
        <div class="header-title">Command Center</div>
        <div class="header-updated">${updatedStr}</div>
      </div>
      <div class="stats">
        <span class="stat-pill"><span class="count">${counts.total}</span> всего</span>
        <span class="stat-pill"><span class="dot" style="background:var(--red)"></span><span class="count">${counts.urgent}</span></span>
        <span class="stat-pill"><span class="dot" style="background:var(--orange)"></span><span class="count">${counts.waiting}</span></span>
        <span class="stat-pill"><span class="dot" style="background:var(--blue)"></span><span class="count">${counts.active}</span></span>
        <span class="stat-pill"><span class="dot" style="background:var(--green)"></span><span class="count">${counts.done}</span></span>
      </div>
    </div>
    <div class="content">
  `;

  STATUS_ORDER.forEach(status => {
    const items = grouped[status];
    if (items.length === 0) return;
    
    const cfg = STATUS_CONFIG[status];
    const collapsed = status === 'done' ? ' collapsed' : '';

    html += `
      <div class="section${collapsed}">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-indicator" style="background:${cfg.color}"></span>
          <span class="section-label">${cfg.label}</span>
          <span class="section-count">${items.length}</span>
          <span class="section-chevron">▼</span>
        </div>
        <div class="section-body">
          <div class="task-list">
    `;

    items.forEach(task => {
      const dl = daysLabel(task);
      const priorityClass = `tag-priority-${task.priority}`;
      
      html += `
        <div class="task-row">
          <div class="task-status-bar" style="background:${cfg.color}"></div>
          <div class="task-main">
            <div class="task-top">
              <span class="task-assignee">${task.assignee}</span>
              <span class="task-desc">${task.task}</span>
            </div>
            <div class="task-meta-row">
              ${task.project ? `<span class="tag tag-project">${task.project}</span>` : ''}
              <span class="tag ${priorityClass}">${PRIORITY_LABELS[task.priority] || task.priority}</span>
              <span class="task-date">${formatDateShort(task.created)}</span>
              ${task.deadline ? `<span class="task-date">→ ${formatDateShort(task.deadline)}</span>` : ''}
              ${dl.text ? `<span class="task-days ${dl.cls}">${dl.text}</span>` : ''}
            </div>
            ${task.notes ? `<div class="task-notes">${task.notes}</div>` : ''}
          </div>
        </div>
      `;
    });

    html += `
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function toggleSection(el) {
  el.parentElement.classList.toggle('collapsed');
}

async function init() {
  try {
    const r = await fetch('./tracker-data.json?' + Date.now());
    const data = await r.json();
    renderApp(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="empty">Ошибка загрузки: ${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
