<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Command Center</title>
<style>
@font-face { font-family: 'PetrovSans'; src: url('fonts/PetrovSans-Bold.woff') format('woff'); font-weight: 700; }
@font-face { font-family: 'PetrovSans'; src: url('fonts/PetrovSans-Regular.woff') format('woff'); font-weight: 400; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000;
  --grouped-bg: #1c1c1e;
  --grouped-bg-hover: #2c2c2e;
  --separator: rgba(255,255,255,0.07);
  --label: rgba(255,255,255,0.55);
  --label2: rgba(255,255,255,0.3);
  --white: #fff;
  --red: #ff453a;
  --orange: #ff9f0a;
  --yellow: #ffd60a;
  --blue: #0a84ff;
  --purple: #bf5af2;
  --green: #30d158;
  --teal: #64d2ff;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  --font-brand: 'PetrovSans', var(--font);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html {
  background: var(--bg);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  font-family: var(--font);
}

body {
  min-height: 100dvh;
  padding-bottom: calc(20px + var(--safe-bottom));
}

/* Header — frosted glass */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: calc(16px + var(--safe-top)) 20px 14px;
  background: rgba(0,0,0,0.7);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
}

.header-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.brand {
  font-family: var(--font-brand);
  font-weight: 700;
  font-size: 24px;
  letter-spacing: -0.01em;
}

.updated {
  font-size: 12px;
  color: var(--label2);
  font-variant-numeric: tabular-nums;
}

/* Stat bar */
.stats {
  display: flex;
  gap: 16px;
  margin-top: 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.stats::-webkit-scrollbar { display: none; }

.stat {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  font-size: 13px;
  color: var(--label);
}
.stat b {
  font-weight: 600;
  color: var(--white);
  font-variant-numeric: tabular-nums;
}
.stat .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

/* Sections */
.page { padding: 0 16px; }

.section {
  margin-top: 24px;
}

.section-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 4px 8px;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

.section-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
}

.section-name {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--label);
}

.section-num {
  font-size: 12px;
  color: var(--label2);
  font-variant-numeric: tabular-nums;
}

.section-arrow {
  margin-left: auto;
  font-size: 11px;
  color: var(--label2);
  transition: transform 0.25s ease;
}

.section.closed .section-arrow {
  transform: rotate(-90deg);
}

.section-body {
  border-radius: 12px;
  background: var(--grouped-bg);
  overflow: hidden;
  max-height: 5000px;
  transition: max-height 0.4s ease, opacity 0.3s;
  opacity: 1;
}

.section.closed .section-body {
  max-height: 0;
  opacity: 0;
}

/* Task item */
.task {
  padding: 14px 16px;
  border-bottom: 0.5px solid var(--separator);
  transition: background 0.15s;
  cursor: default;
}

.task:last-child { border-bottom: none; }
.task:active { background: var(--grouped-bg-hover); }

@media (hover: hover) {
  .task:hover { background: var(--grouped-bg-hover); }
}

/* Row 1: Assignee + deadline chip */
.task-r1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}

.task-who {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-when {
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 6px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.task-when.overdue {
  background: rgba(255,69,58,0.15);
  color: var(--red);
}
.task-when.today {
  background: rgba(255,214,10,0.15);
  color: var(--yellow);
}
.task-when.soon {
  background: rgba(255,159,10,0.1);
  color: var(--orange);
}
.task-when.normal {
  background: rgba(255,255,255,0.06);
  color: var(--label);
}
.task-when.none {
  display: none;
}

/* Row 2: Task description */
.task-what {
  font-size: 15px;
  font-weight: 400;
  color: var(--label);
  line-height: 1.4;
}

/* Row 3: Tags */
.task-tags {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.pill {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 5px;
  letter-spacing: 0.01em;
}

.pill-project {
  background: rgba(255,255,255,0.06);
  color: var(--label);
}

.pill-high {
  background: rgba(255,69,58,0.1);
  color: var(--red);
}
.pill-medium {
  background: rgba(255,159,10,0.08);
  color: var(--orange);
}
.pill-low {
  background: rgba(255,255,255,0.05);
  color: var(--label2);
}

/* Notes (expandable) */
.task-notes {
  font-size: 13px;
  color: var(--label2);
  line-height: 1.35;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 0.5px solid var(--separator);
  display: none;
}

.task.open .task-notes { display: block; }

/* Created date */
.task-created {
  font-size: 11px;
  color: var(--label2);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}

.task.open .task-created { display: block; }
.task-created { display: none; }

/* Empty */
.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
  font-size: 15px;
  color: var(--label2);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.section {
  animation: fadeIn 0.35s ease both;
}
.section:nth-child(1) { animation-delay: 0s; }
.section:nth-child(2) { animation-delay: 0.05s; }
.section:nth-child(3) { animation-delay: 0.1s; }
.section:nth-child(4) { animation-delay: 0.15s; }
.section:nth-child(5) { animation-delay: 0.2s; }

/* Desktop wider */
@media (min-width: 700px) {
  .page { max-width: 680px; margin: 0 auto; }
  .header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .stats { margin-top: 0; }
}
</style>
<link rel="preconnect" href="https://rsms.me"><link href="https://rsms.me/inter/inter.css" rel="stylesheet">
</head>
<body>

<div id="app"></div>

<script>
const STATUS = {
  urgent:      { label: 'Горит',         color: 'var(--red)' },
  waiting:     { label: 'Ждёт ответа',  color: 'var(--orange)' },
  in_progress: { label: 'В работе',      color: 'var(--blue)' },
  blocked:     { label: 'Заблокировано', color: 'var(--purple)' },
  done:        { label: 'Закрыто',       color: 'var(--green)' }
};

const ORDER = ['urgent','waiting','in_progress','blocked','done'];

function parseDate(s) {
  if (!s) return null;
  const p = s.split('-').map(Number);
  return new Date(p[0], p[1]-1, p[2]);
}

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function diffDays(ds) {
  const d = parseDate(ds);
  if (!d) return null;
  return Math.round((d - today()) / 86400000);
}

function deadlineChip(task) {
  if (!task.deadline) return { text: '', cls: 'none' };
  const diff = diffDays(task.deadline);
  if (diff === null) return { text: '', cls: 'none' };
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const d = parseDate(task.deadline);
  const label = d.getDate() + ' ' + months[d.getMonth()];
  if (diff < 0) return { text: `${label} · просрочено`, cls: 'overdue' };
  if (diff === 0) return { text: `${label} · сегодня`, cls: 'today' };
  if (diff === 1) return { text: `${label} · завтра`, cls: 'soon' };
  if (diff <= 3) return { text: `${label} · ${diff} дн.`, cls: 'soon' };
  return { text: label, cls: 'normal' };
}

function fmtDate(ds) {
  if (!ds) return '';
  const d = parseDate(ds);
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function render(data) {
  const tasks = data.tasks || [];
  if (!tasks.length) {
    document.getElementById('app').innerHTML = '<div class="empty-state">Нет активных задач</div>';
    return;
  }

  const groups = {};
  ORDER.forEach(s => groups[s] = []);
  tasks.forEach(t => { if (groups[t.status]) groups[t.status].push(t); });

  const counts = {};
  ORDER.forEach(s => counts[s] = groups[s].length);

  let upd = '';
  if (data.lastUpdated) {
    const d = new Date(data.lastUpdated);
    upd = d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})
      + ' ' + d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  }

  let h = `
  <div class="header">
    <div class="header-row">
      <div class="brand">Command Center</div>
      <div class="updated">${upd}</div>
    </div>
    <div class="stats">
      <div class="stat"><b>${tasks.length}</b> всего</div>
      <div class="stat"><span class="dot" style="background:var(--red)"></span><b>${counts.urgent}</b></div>
      <div class="stat"><span class="dot" style="background:var(--orange)"></span><b>${counts.waiting}</b></div>
      <div class="stat"><span class="dot" style="background:var(--blue)"></span><b>${counts.in_progress}</b></div>
      <div class="stat"><span class="dot" style="background:var(--green)"></span><b>${counts.done}</b></div>
    </div>
  </div>
  <div class="page">`;

  ORDER.forEach(status => {
    const items = groups[status];
    if (!items.length) return;
    const cfg = STATUS[status];
    const closed = status === 'done' ? ' closed' : '';

    h += `
    <div class="section${closed}">
      <div class="section-head" onclick="tog(this)">
        <span class="section-dot" style="background:${cfg.color}"></span>
        <span class="section-name">${cfg.label}</span>
        <span class="section-num">${items.length}</span>
        <span class="section-arrow">▼</span>
      </div>
      <div class="section-body">`;

    items.forEach(task => {
      const chip = deadlineChip(task);
      const priClass = 'pill-' + (task.priority || 'low');

      h += `
        <div class="task" onclick="this.classList.toggle('open')">
          <div class="task-r1">
            <div class="task-who">${esc(task.assignee)}</div>
            <div class="task-when ${chip.cls}">${chip.text}</div>
          </div>
          <div class="task-what">${esc(task.task)}</div>
          <div class="task-tags">
            ${task.project ? `<span class="pill pill-project">${esc(task.project)}</span>` : ''}
            <span class="pill ${priClass}">${esc(task.priority || '')}</span>
          </div>
          ${task.notes ? `<div class="task-notes">${esc(task.notes)}</div>` : ''}
          <div class="task-created">Создано ${fmtDate(task.created)}</div>
        </div>`;
    });

    h += `</div></div>`;
  });

  h += '</div>';
  document.getElementById('app').innerHTML = h;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function tog(el) { el.parentElement.classList.toggle('closed'); }

fetch('./tracker-data.json?' + Date.now())
  .then(r => r.json())
  .then(render)
  .catch(e => {
    document.getElementById('app').innerHTML = `<div class="empty-state">Ошибка: ${e.message}</div>`;
  });
</script>
</body>
</html>
