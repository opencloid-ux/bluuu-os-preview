<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Command Center</title>
<style>
@font-face { font-family: 'PetrovSans'; src: url('fonts/PetrovSans-Bold.woff') format('woff'); font-weight: 700; }
@font-face { font-family: 'PetrovSans'; src: url('fonts/PetrovSans-Regular.woff') format('woff'); font-weight: 400; }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000;
  --surface: #111113;
  --surface2: #1a1a1d;
  --surface3: #222225;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.1);
  --text: #f5f5f7;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.35);
  --red: #ff453a;
  --orange: #ff9f0a;
  --yellow: #ffd60a;
  --blue: #0a84ff;
  --purple: #bf5af2;
  --green: #30d158;
  --teal: #64d2ff;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-brand: 'PetrovSans', var(--font);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --sidebar: 280px;
}

html { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; font-family: var(--font); font-size: 14px; }
body { min-height: 100dvh; }

/* ─── HEADER ─── */
.hdr {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(12px + var(--safe-top)) 24px 12px;
  background: rgba(0,0,0,0.75);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
}
.hdr-left { display: flex; align-items: center; gap: 16px; }
.brand { font-family: var(--font-brand); font-weight: 700; font-size: 20px; letter-spacing: -0.02em; }
.hdr-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.hdr-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 500; color: var(--text2);
  padding: 4px 10px; border-radius: 8px;
  background: var(--surface2);
}
.hdr-pill b { color: var(--text); font-variant-numeric: tabular-nums; }
.hdr-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
.hdr-time { font-size: 12px; color: var(--text3); font-variant-numeric: tabular-nums; }

/* ─── LAYOUT ─── */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar) 1fr var(--sidebar);
  gap: 0;
  min-height: calc(100vh - 52px);
}
.col-l, .col-r {
  padding: 20px 16px;
  border-right: 0.5px solid var(--border);
  overflow-y: auto;
}
.col-r { border-right: none; border-left: 0.5px solid var(--border); }
.col-c { padding: 20px 24px; overflow-y: auto; }

/* ─── WIDGETS (sidebars) ─── */
.widget { margin-bottom: 24px; }
.w-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px;
}

/* Stat cards */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card {
  background: var(--surface); border-radius: 12px; padding: 14px 12px;
  border: 0.5px solid var(--border);
}
.stat-card .num { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
.stat-card .lab { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Timeline */
.tl-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 0.5px solid var(--border);
}
.tl-item:last-child { border-bottom: none; }
.tl-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.tl-body { flex: 1; min-width: 0; }
.tl-who { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-what { font-size: 12px; color: var(--text2); line-height: 1.3; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tl-date { font-size: 11px; color: var(--text3); margin-top: 3px; font-variant-numeric: tabular-nums; }

/* Project list */
.proj-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 0.5px solid var(--border);
}
.proj-item:last-child { border-bottom: none; }
.proj-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-bar-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.proj-bar { width: 48px; height: 4px; border-radius: 2px; background: var(--surface3); overflow: hidden; }
.proj-bar-fill { height: 100%; border-radius: 2px; }
.proj-count { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; min-width: 18px; text-align: right; }

/* Team */
.team-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 0.5px solid var(--border);
}
.team-item:last-child { border-bottom: none; }
.team-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.team-info { flex: 1; min-width: 0; }
.team-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-tasks { font-size: 11px; color: var(--text3); }

/* ─── CENTER: TASKS ─── */
.section { margin-bottom: 28px; }
.sec-head {
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 10px; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.sec-dot { width: 8px; height: 8px; border-radius: 50%; }
.sec-name { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); }
.sec-num { font-size: 11px; color: var(--text3); }
.sec-arrow { margin-left: auto; font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.section.closed .sec-arrow { transform: rotate(-90deg); }
.sec-body {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px;
  max-height: 5000px; transition: max-height 0.35s ease, opacity 0.25s;
  opacity: 1; overflow: hidden;
}
.section.closed .sec-body { max-height: 0; opacity: 0; }

/* Task cards */
.card {
  background: var(--surface); border-radius: 12px;
  padding: 16px; border: 0.5px solid var(--border);
  cursor: default; transition: border-color 0.15s, background 0.15s;
  display: flex; flex-direction: column; gap: 8px;
}
.card:hover { border-color: var(--border-strong); background: var(--surface2); }

.card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-who { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-deadline {
  flex-shrink: 0; font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 6px; white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.card-deadline.overdue { background: rgba(255,69,58,0.12); color: var(--red); }
.card-deadline.today { background: rgba(255,214,10,0.12); color: var(--yellow); }
.card-deadline.soon { background: rgba(255,159,10,0.1); color: var(--orange); }
.card-deadline.normal { background: rgba(255,255,255,0.05); color: var(--text3); }
.card-deadline.none { display: none; }

.card-what { font-size: 13px; color: var(--text2); line-height: 1.4; }

.card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.pill { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 5px; letter-spacing: 0.01em; }
.pill-project { background: rgba(255,255,255,0.05); color: var(--text3); }
.pill-high { background: rgba(255,69,58,0.08); color: var(--red); }
.pill-medium { background: rgba(255,159,10,0.06); color: var(--orange); }
.pill-low { background: rgba(255,255,255,0.04); color: var(--text3); }

.card-notes {
  font-size: 12px; color: var(--text3); line-height: 1.35;
  padding-top: 8px; border-top: 0.5px solid var(--border);
  display: none;
}
.card.open .card-notes { display: block; }

/* ─── RESPONSIVE ─── */
@media (max-width: 1100px) {
  .layout { grid-template-columns: 240px 1fr; }
  .col-r { display: none; }
}
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .col-l { display: none; }
  .col-c { padding: 16px; }
  .hdr { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
  .hdr-pills { display: flex; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
  .sec-body { grid-template-columns: 1fr; }
}

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.section { animation: fadeUp 0.3s ease both; }
.section:nth-child(2) { animation-delay: 0.05s; }
.section:nth-child(3) { animation-delay: 0.1s; }
.section:nth-child(4) { animation-delay: 0.15s; }
.section:nth-child(5) { animation-delay: 0.2s; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
</style>
<link rel="preconnect" href="https://rsms.me"><link href="https://rsms.me/inter/inter.css" rel="stylesheet">
</head>
<body>

<div id="app"></div>

<script>
const STATUS = {
  urgent:      { label: 'Горит',         color: 'var(--red)',    hex: '#ff453a' },
  waiting:     { label: 'Ждёт ответа',  color: 'var(--orange)', hex: '#ff9f0a' },
  in_progress: { label: 'В работе',      color: 'var(--blue)',   hex: '#0a84ff' },
  blocked:     { label: 'Заблокировано', color: 'var(--purple)', hex: '#bf5af2' },
  done:        { label: 'Закрыто',       color: 'var(--green)',  hex: '#30d158' }
};
const ORDER = ['urgent','waiting','in_progress','blocked','done'];
const COLORS = ['#ff453a','#0a84ff','#bf5af2','#30d158','#ff9f0a','#64d2ff','#ffd60a','#ff375f'];

function parseDate(s) { if (!s) return null; const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function diffDays(s) { const d=parseDate(s); if(!d) return null; return Math.round((d-today())/864e5); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

const MO = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
function fmtShort(s) { const d=parseDate(s); if(!d) return ''; return d.getDate()+' '+MO[d.getMonth()]; }
function fmtFull(s) { const d=parseDate(s); if(!d) return ''; return d.getDate()+' '+MO[d.getMonth()]+' '+d.getFullYear(); }

function deadlineChip(t) {
  if (!t.deadline) return { text:'', cls:'none' };
  const diff = diffDays(t.deadline);
  if (diff===null) return { text:'', cls:'none' };
  const l = fmtShort(t.deadline);
  if (diff<0) return { text: l+' · просрочено', cls:'overdue' };
  if (diff===0) return { text: l+' · сегодня', cls:'today' };
  if (diff===1) return { text: l+' · завтра', cls:'soon' };
  if (diff<=3) return { text: l+' · '+diff+' дн.', cls:'soon' };
  return { text: l, cls:'normal' };
}

function hashColor(s) { let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; }

function render(data) {
  const tasks = data.tasks || [];
  if (!tasks.length) { document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:80vh;color:var(--text3)">Нет задач</div>'; return; }

  // Groups
  const groups = {}; ORDER.forEach(s => groups[s]=[]);
  tasks.forEach(t => { if(groups[t.status]) groups[t.status].push(t); });
  const counts = {}; ORDER.forEach(s => counts[s]=groups[s].length);

  // Projects
  const projMap = {};
  tasks.forEach(t => {
    const p = t.project || 'Без проекта';
    if (!projMap[p]) projMap[p] = { total:0, done:0 };
    projMap[p].total++;
    if (t.status==='done') projMap[p].done++;
  });
  const projects = Object.entries(projMap).sort((a,b)=>b[1].total-a[1].total);

  // Team
  const teamMap = {};
  tasks.forEach(t => {
    const a = t.assignee || '?';
    if (!teamMap[a]) teamMap[a] = { active:0, done:0 };
    if (t.status==='done') teamMap[a].done++; else teamMap[a].active++;
  });
  const team = Object.entries(teamMap).sort((a,b)=>b[1].active-a[1].active);

  // Upcoming (deadlines within 7 days, sorted)
  const upcoming = tasks
    .filter(t => t.deadline && t.status!=='done')
    .map(t => ({...t, diff: diffDays(t.deadline)}))
    .filter(t => t.diff !== null && t.diff <= 7)
    .sort((a,b) => a.diff - b.diff);

  // Updated
  let upd = '';
  if (data.lastUpdated) {
    const d = new Date(data.lastUpdated);
    upd = d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' +
          d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  }

  let h = '';

  // ─── HEADER ───
  h += `<div class="hdr">
    <div class="hdr-left">
      <div class="brand">Command Center</div>
      <div class="hdr-pills">
        <div class="hdr-pill"><b>${tasks.length}</b>&nbsp;задач</div>
        <div class="hdr-pill"><span class="dot" style="background:var(--red)"></span>&nbsp;<b>${counts.urgent}</b></div>
        <div class="hdr-pill"><span class="dot" style="background:var(--orange)"></span>&nbsp;<b>${counts.waiting}</b></div>
        <div class="hdr-pill"><span class="dot" style="background:var(--blue)"></span>&nbsp;<b>${counts.in_progress}</b></div>
        <div class="hdr-pill"><span class="dot" style="background:var(--green)"></span>&nbsp;<b>${counts.done}</b></div>
      </div>
    </div>
    <div class="hdr-time">${upd}</div>
  </div>`;

  // ─── 3 COLUMNS ───
  h += '<div class="layout">';

  // ─── LEFT SIDEBAR ───
  h += '<div class="col-l">';

  // Stats
  const overdue = tasks.filter(t=>t.deadline && t.status!=='done' && diffDays(t.deadline)<0).length;
  const todayCount = tasks.filter(t=>t.deadline && t.status!=='done' && diffDays(t.deadline)===0).length;
  h += `<div class="widget">
    <div class="w-title">Сводка</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="num" style="color:var(--red)">${counts.urgent + overdue}</div><div class="lab">Горит</div></div>
      <div class="stat-card"><div class="num" style="color:var(--yellow)">${todayCount}</div><div class="lab">Сегодня</div></div>
      <div class="stat-card"><div class="num" style="color:var(--orange)">${counts.waiting}</div><div class="lab">Ждут</div></div>
      <div class="stat-card"><div class="num" style="color:var(--blue)">${counts.in_progress}</div><div class="lab">В работе</div></div>
    </div>
  </div>`;

  // Upcoming timeline
  if (upcoming.length) {
    h += '<div class="widget"><div class="w-title">Ближайшие дедлайны</div>';
    upcoming.forEach(t => {
      const col = t.diff<0 ? 'var(--red)' : t.diff===0 ? 'var(--yellow)' : t.diff<=2 ? 'var(--orange)' : 'var(--text3)';
      const when = t.diff<0 ? 'просрочено' : t.diff===0 ? 'сегодня' : t.diff===1 ? 'завтра' : fmtShort(t.deadline);
      h += `<div class="tl-item">
        <div class="tl-dot" style="background:${col}"></div>
        <div class="tl-body">
          <div class="tl-who">${esc(t.assignee)}</div>
          <div class="tl-what">${esc(t.task)}</div>
          <div class="tl-date">${when}</div>
        </div>
      </div>`;
    });
    h += '</div>';
  }

  h += '</div>'; // col-l

  // ─── CENTER ───
  h += '<div class="col-c">';
  ORDER.forEach(status => {
    const items = groups[status];
    if (!items.length) return;
    const cfg = STATUS[status];
    const closed = status==='done' ? ' closed' : '';

    h += `<div class="section${closed}">
      <div class="sec-head" onclick="tog(this)">
        <span class="sec-dot" style="background:${cfg.color}"></span>
        <span class="sec-name">${cfg.label}</span>
        <span class="sec-num">${items.length}</span>
        <span class="sec-arrow">▼</span>
      </div>
      <div class="sec-body">`;

    items.forEach(t => {
      const chip = deadlineChip(t);
      const priCls = 'pill-'+(t.priority||'low');
      h += `<div class="card" onclick="this.classList.toggle('open')">
        <div class="card-top">
          <div class="card-who">${esc(t.assignee)}</div>
          <div class="card-deadline ${chip.cls}">${chip.text}</div>
        </div>
        <div class="card-what">${esc(t.task)}</div>
        <div class="card-meta">
          ${t.project ? `<span class="pill pill-project">${esc(t.project)}</span>` : ''}
          <span class="pill ${priCls}">${esc(t.priority||'')}</span>
        </div>
        ${t.notes ? `<div class="card-notes">${esc(t.notes)}</div>` : ''}
      </div>`;
    });

    h += '</div></div>';
  });
  h += '</div>'; // col-c

  // ─── RIGHT SIDEBAR ───
  h += '<div class="col-r">';

  // Projects
  h += '<div class="widget"><div class="w-title">Проекты</div>';
  projects.forEach(([name, d]) => {
    const pct = d.total ? Math.round(d.done/d.total*100) : 0;
    const col = hashColor(name);
    h += `<div class="proj-item">
      <div class="proj-name">${esc(name)}</div>
      <div class="proj-bar-wrap">
        <div class="proj-bar"><div class="proj-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="proj-count">${d.done}/${d.total}</div>
      </div>
    </div>`;
  });
  h += '</div>';

  // Team
  h += '<div class="widget"><div class="w-title">Команда</div>';
  team.forEach(([name, d]) => {
    const col = hashColor(name);
    const initials = name.split(/[\s()]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    h += `<div class="team-item">
      <div class="team-avatar" style="background:${col}22;color:${col}">${initials}</div>
      <div class="team-info">
        <div class="team-name">${esc(name)}</div>
        <div class="team-tasks">${d.active} активн. · ${d.done} закр.</div>
      </div>
    </div>`;
  });
  h += '</div>';

  h += '</div>'; // col-r

  h += '</div>'; // layout

  document.getElementById('app').innerHTML = h;
}

function tog(el) { el.parentElement.classList.toggle('closed'); }

fetch('./tracker-data.json?'+Date.now()).then(r=>r.json()).then(render).catch(e=>{
  document.getElementById('app').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:80vh;color:var(--text3)">Ошибка: ${e.message}</div>`;
});
</script>
</body>
</html>
