<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'PetrovSans';
            src: url('fonts/PetrovSans-Regular.woff') format('woff');
            font-weight: 400;
        }

        @font-face {
            font-family: 'PetrovSans';
            src: url('fonts/PetrovSans-Bold.woff') format('woff');
            font-weight: 700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: auto;
        }

        body {
            background-color: #06060a;
            color: #e8e8ed;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header Bar */
        .header {
            margin-bottom: 32px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 20px;
        }

        .title {
            font-family: 'PetrovSans', system-ui, -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #6b6b80;
        }

        .last-updated {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #44445a;
        }

        /* Stats Pills */
        .stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background-color: #0d0d14;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #e8e8ed;
        }

        .stat-label {
            color: #6b6b80;
            font-size: 11px;
        }

        /* Section */
        .section {
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 12px;
            transition: opacity 200ms ease;
        }

        .section-header:hover {
            opacity: 0.8;
        }

        .section-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            opacity: 0.6;
            transition: transform 200ms cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .section.collapsed .section-toggle {
            transform: rotate(-90deg);
        }

        .section-label {
            font-family: 'PetrovSans', system-ui, -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #e8e8ed;
        }

        .section-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #6b6b80;
            margin-left: auto;
        }

        .section-content {
            max-height: 10000px;
            overflow: hidden;
            transition: max-height 300ms cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .section.collapsed .section-content {
            max-height: 0;
        }

        /* Task Row */
        .task-row {
            display: grid;
            grid-template-columns: 3px 1fr;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background-color 200ms cubic-bezier(0.25, 0.1, 0.25, 1);
            padding: 12px 0;
        }

        .task-row:hover {
            background-color: #14141f;
        }

        .task-status-bar {
            width: 3px;
            margin-right: 16px;
            background-color: #ef4444;
        }

        .task-status-bar.waiting {
            background-color: #f59e0b;
        }

        .task-status-bar.in-progress {
            background-color: #3b82f6;
        }

        .task-status-bar.blocked {
            background-color: #8b5cf6;
        }

        .task-status-bar.done {
            background-color: #10b981;
        }

        .task-content {
            display: grid;
            grid-template-columns: auto 1fr auto auto auto auto auto;
            gap: 16px;
            align-items: center;
        }

        .task-assignee {
            font-size: 15px;
            font-weight: 600;
            color: #e8e8ed;
            white-space: nowrap;
            min-width: max-content;
        }

        .task-description {
            font-size: 14px;
            color: #6b6b80;
            word-break: break-word;
        }

        .task-project {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 4px 10px;
            background-color: rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            color: #6b6b80;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .task-dates {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .task-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #44445a;
            white-space: nowrap;
        }

        .task-days {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            white-space: nowrap;
            min-width: 60px;
            text-align: right;
        }

        .task-days.overdue {
            color: #ef4444;
        }

        .task-days.normal {
            color: #44445a;
        }

        .task-priority {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
            font-weight: 600;
        }

        .task-priority.high {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .task-priority.medium {
            background-color: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .task-priority.low {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .task-notes {
            font-size: 12px;
            color: #6b6b80;
            grid-column: 2 / -1;
            margin-top: 4px;
            font-style: italic;
        }

        /* Empty State */
        .empty-state {
            padding: 60px 24px;
            text-align: center;
            color: #44445a;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .task-content {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .task-row {
                grid-template-columns: 3px auto 1fr;
            }

            .task-assignee {
                font-size: 14px;
            }

            .task-dates {
                grid-column: 1 / -1;
                gap: 12px;
                flex-wrap: wrap;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header-top {
                flex-direction: column;
                gap: 12px;
                padding-bottom: 16px;
            }

            .section-header {
                padding: 10px 0;
                margin-bottom: 10px;
            }

            .task-assignee {
                font-size: 14px;
            }

            .task-description {
                font-size: 13px;
            }

            .task-priority, .task-project {
                font-size: 9px;
            }
        }

        /* Loading state */
        .loading {
            padding: 40px 24px;
            text-align: center;
            color: #44445a;
        }

        /* Utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <div class="title">COMMAND CENTER</div>
                <div class="last-updated" id="lastUpdated">Loading...</div>
            </div>
            <div class="stats" id="stats"></div>
        </div>

        <!-- Content -->
        <div id="content"></div>
    </div>

    <script>
        // Parse date safely, avoiding timezone issues
        function parseDate(dateString) {
            if (!dateString) return null;
            // Split manually to avoid timezone conversion
            const parts = dateString.split('-');
            if (parts.length !== 3) return null;
            const year = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10);
            const day = parseInt(parts[2], 10);
            if (isNaN(year) || isNaN(month) || isNaN(day)) return null;
            // Create date at midnight UTC-0 conceptually, then work with it locally
            const date = new Date(year, month - 1, day);
            return date;
        }

        // Calculate days between two dates
        function daysBetween(date1, date2) {
            if (!date1 || !date2) return null;
            const ms = date2.getTime() - date1.getTime();
            return Math.floor(ms / (1000 * 60 * 60 * 24));
        }

        // Format date for display
        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = parseDate(dateString);
            if (!date) return dateString;
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Status labels and emojis
        const statusInfo = {
            urgent: { label: 'ГОРИТ', emoji: '🔴' },
            waiting: { label: 'ЖДЁТ ОТВЕТА', emoji: '⏰' },
            in_progress: { label: 'В РАБОТЕ', emoji: '🔵' },
            blocked: { label: 'ЗАБЛОКИРОВАНО', emoji: '⛔' },
            done: { label: 'ЗАКРЫТО', emoji: '✅' }
        };

        const statusOrder = ['urgent', 'waiting', 'in_progress', 'blocked', 'done'];

        // Load and render data
        async function loadData() {
            try {
                const response = await fetch('./tracker-data.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                renderUI(data);
            } catch (error) {
                console.error('Failed to load tracker data:', error);
                document.getElementById('content').innerHTML = 
                    '<div class="empty-state">Ошибка загрузки данных</div>';
            }
        }

        function renderUI(data) {
            // Update last updated
            const lastUpdated = document.getElementById('lastUpdated');
            if (data.lastUpdated) {
                const date = new Date(data.lastUpdated);
                const timeStr = date.toLocaleString('ru-RU', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                lastUpdated.textContent = timeStr;
            }

            // Group tasks by status
            const grouped = {};
            statusOrder.forEach(status => {
                grouped[status] = [];
            });

            const tasks = data.tasks || [];
            tasks.forEach(task => {
                if (grouped[task.status]) {
                    grouped[task.status].push(task);
                }
            });

            // Calculate stats
            const stats = {
                total: tasks.length,
                urgent: grouped.urgent.length,
                waiting: grouped.waiting.length,
                in_progress: grouped.in_progress.length,
                done: grouped.done.length
            };

            // Render stats
            renderStats(stats);

            // Render sections
            const content = document.getElementById('content');
            if (tasks.length === 0) {
                content.innerHTML = '<div class="empty-state">Нет активных задач</div>';
                return;
            }

            let html = '';
            statusOrder.forEach(status => {
                const sectionTasks = grouped[status];
                if (sectionTasks.length === 0) return;

                const info = statusInfo[status];
                const isCollapsed = status === 'done';
                
                html += `
                    <div class="section ${isCollapsed ? 'collapsed' : ''}">
                        <div class="section-header">
                            <div class="section-toggle">${info.emoji}</div>
                            <div class="section-label">${info.label}</div>
                            <div class="section-count">${sectionTasks.length}</div>
                        </div>
                        <div class="section-content">
                            ${sectionTasks.map(task => renderTask(task)).join('')}
                        </div>
                    </div>
                `;
            });

            content.innerHTML = html;

            // Attach section toggle listeners
            document.querySelectorAll('.section-header').forEach(header => {
                header.addEventListener('click', function() {
                    this.closest('.section').classList.toggle('collapsed');
                });
            });
        }

        function renderTask(task) {
            const deadlineDate = parseDate(task.deadline);
            const now = new Date();
            now.setHours(0, 0, 0, 0); // Set to midnight

            let daysText = '—';
            let daysClass = 'normal';
            if (deadlineDate) {
                const days = daysBetween(now, deadlineDate);
                if (days < 0) {
                    daysText = `⚠ ${Math.abs(days)} д.`;
                    daysClass = 'overdue';
                } else if (days === 0) {
                    daysText = 'Сегодня';
                } else {
                    daysText = `+${days} д.`;
                }
            }

            const statusBar = task.status.replace('_', '-');
            const formattedCreated = formatDate(task.created);
            const formattedDeadline = formatDate(task.deadline);

            let html = `
                <div class="task-row">
                    <div class="task-status-bar ${statusBar}"></div>
                    <div class="task-content">
                        <div class="task-assignee">${escapeHtml(task.assignee)}</div>
                        <div class="task-description">${escapeHtml(task.task)}</div>
                        <div class="task-project">${escapeHtml(task.project)}</div>
                        <div class="task-date">${formattedCreated}</div>
                        <div class="task-date">${formattedDeadline}</div>
                        <div class="task-days ${daysClass}">${daysText}</div>
                        <div class="task-priority ${task.priority}">${task.priority.toUpperCase()}</div>
            `;

            if (task.notes) {
                html += `<div class="task-notes">${escapeHtml(task.notes)}</div>`;
            }

            html += `
                    </div>
                </div>
            `;

            return html;
        }

        function renderStats(stats) {
            const statsContainer = document.getElementById('stats');
            const pills = [
                { label: 'Total', count: stats.total },
                { label: '🔴 Urgent', count: stats.urgent },
                { label: '⏰ Waiting', count: stats.waiting },
                { label: '🔵 Active', count: stats.in_progress },
                { label: '✅ Done', count: stats.done }
            ];

            statsContainer.innerHTML = pills.map(pill => `
                <div class="stat-pill">
                    <span class="stat-label">${pill.label}</span>
                    <span>${pill.count}</span>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load on ready
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
