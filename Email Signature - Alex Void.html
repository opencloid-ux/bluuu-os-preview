<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;">

<!-- Outer wrapper with left accent border -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;">
  <tr>
    <!-- Left accent line -->
    <td style="width:3px;background:linear-gradient(180deg,#182DA8,#324CDA);border-radius:2px;" valign="top">
      <div style="width:3px;min-height:1px;"></div>
    </td>
    <!-- Spacer -->
    <td style="width:18px;"></td>
    <!-- Content -->
    <td valign="top">

      <table cellpadding="0" cellspacing="0" border="0">

        <!-- Name -->
        <tr>
          <td style="padding-bottom:1px;">
            <p style="margin:0;font-size:20px;font-weight:700;color:#0a0a0a;letter-spacing:0.3px;">Alex Void</p>
          </td>
        </tr>

        <!-- Title -->
        <tr>
          <td style="padding-bottom:18px;">
            <p style="margin:0;font-size:10px;font-weight:400;color:#aaa;text-transform:uppercase;letter-spacing:3.5px;">CEO & Founder</p>
          </td>
        </tr>

        <!-- Company name -->
        <tr>
          <td style="padding-bottom:14px;">
            <p style="margin:0;font-size:13px;letter-spacing:4px;text-transform:uppercase;">
              <span style="color:#182DA8;font-weight:700;">BLUUU</span><span style="font-weight:300;color:#bbb;">&nbsp;&nbsp;TOURS</span>
            </p>
          </td>
        </tr>

        <!-- Contact details stacked elegantly -->
        <tr>
          <td>
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding-right:6px;" valign="middle">
                  <div style="width:4px;height:4px;background:#182DA8;border-radius:50%;"></div>
                </td>
                <td style="font-size:12px;color:#666;padding-bottom:5px;" valign="middle">
                  <a href="mailto:alex@bluuu.tours" style="color:#666;text-decoration:none;">alex@bluuu.tours</a>
                </td>
              </tr>
            </table>
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding-right:6px;" valign="middle">
                  <div style="width:4px;height:4px;background:#182DA8;border-radius:50%;"></div>
                </td>
                <td style="font-size:12px;" valign="middle">
                  <a href="https://bluuu.tours" style="color:#182DA8;text-decoration:none;font-weight:500;">bluuu.tours</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>

      </table>

    </td>
  </tr>
</table>

</body>
</html>
